name: UX Improvement Analysis — Weekly

on:
  schedule:
    - cron: '0 8 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel
        run: sleep 30

      - name: Run full audit suite
        run: |
          BASE_URL=${{ secrets.VERCEL_PREVIEW_URL }} \
          npx playwright test tests/audit/ \
            --reporter=json \
            --output=improvement-report.json \
            || true
        env:
          BASE_URL: ${{ secrets.VERCEL_PREVIEW_URL }}

      - name: Collect git log
        run: git log --oneline -50 > git-log.txt

      - name: Collect git diff
        run: git diff HEAD~10 --stat > git-diff.txt

      - name: Run Gemini improvement analysis
        run: node .github/scripts/gemini-improve.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit improvement report
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add AGENT_REPORTS/improvements/
          git diff --cached --quiet || git commit -m "[infra] weekly improvement report $(date +%Y-%m-%d)"
          git pull origin main --rebase && git push origin main || true
        continue-on-error: true
