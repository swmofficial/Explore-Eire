name: UX Test Pipeline

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  ux-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel preview
        run: |
          echo "Waiting 90s for Vercel to build..."
          sleep 90
          echo "DEPLOYMENT_URL=${{ secrets.VERCEL_PREVIEW_URL }}" >> $GITHUB_ENV

      - name: Debug URL
        run: |
          echo "BASE_URL is: ${{ secrets.VERCEL_PREVIEW_URL }}"
          curl -I "${{ secrets.VERCEL_PREVIEW_URL }}" || echo "URL not reachable"

      - name: Collect Vercel build logs
        run: |
          DEPLOYMENT=$(curl -s "https://api.vercel.com/v6/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&limit=1&target=preview" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" | \
            node -e "const d=[];process.stdin.on('data',c=>d.push(c));process.stdin.on('end',()=>{const r=JSON.parse(d.join(''));console.log(r.deployments[0]?.uid||'');});")
          if [ -n "$DEPLOYMENT" ]; then
            curl -s "https://api.vercel.com/v2/deployments/$DEPLOYMENT/events?limit=100" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" | \
              node -e "const d=[];process.stdin.on('data',c=>d.push(c));process.stdin.on('end',()=>{const r=JSON.parse(d.join(''));r.forEach(e=>e.type==='stdout'&&console.log(e.payload?.text||''));});" \
              > vercel-build-logs.txt 2>&1 || echo "Could not fetch build logs" > vercel-build-logs.txt
          else
            echo "No deployment found" > vercel-build-logs.txt
          fi

      - name: Run Playwright UX tests
        run: npx playwright test --reporter=json > playwright-report.json || true
        env:
          BASE_URL: ${{ secrets.VERCEL_PREVIEW_URL }}

      - name: Collect git log
        run: git log --oneline -20 > git-log.txt

      - name: Collect git diff
        run: git diff HEAD~5..HEAD --stat > git-diff.txt

      - name: Send to Gemini for analysis
        run: node .github/scripts/gemini-analysis.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit agent report
        continue-on-error: true
        run: |
          git config user.name "ux-agent"
          git config user.email "ux-agent@exploreeire.ie"
          git add AGENT_REPORTS/
          git commit -m "[ux] automated report $(date +%Y-%m-%d-%H%M)" || echo "Nothing to commit"
          git push origin dev || echo "Push failed — will retry on next run"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
