name: UX Agent Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  ux-agent:
    runs-on: ubuntu-latest
    outputs:
      trigger_audit: ${{ steps.streak.outputs.trigger_audit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Check CLAUDE.md size (warn-only)
        # Warns when CLAUDE.md grows beyond the 6000-char working limit.
        # We do NOT fail the pipeline — this is a guardrail, not a gate.
        # If CLAUDE.md grows back to 40KB the next session, this warning
        # is the early signal to trim again.
        run: |
          if [ -f CLAUDE.md ]; then
            size=$(wc -c < CLAUDE.md)
            echo "CLAUDE.md size: ${size} chars"
            if [ "$size" -gt 6000 ]; then
              echo "::warning file=CLAUDE.md::CLAUDE.md is ${size} chars — limit is 6000. Move overflow to BRAIN/ files."
            fi
          else
            echo "::warning::CLAUDE.md not found"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel deployment
        run: |
          echo "Waiting 90s for Vercel to build..."
          sleep 90
          echo "DEPLOYMENT_URL=${{ secrets.VERCEL_PREVIEW_URL }}" >> $GITHUB_ENV

      # ────────────────────────────────────────────────────────────────
      # Run the three-tier UX suites SEQUENTIALLY in a single job.
      # global-setup.js runs once per Playwright invocation and produces
      # .auth/free.json and .auth/pro.json from live Supabase logins.
      # We invoke Playwright a single time and let it run all three spec
      # files; this gives us a single playwright-report.json that the
      # ux-agent.js script partitions by spec filename.
      # ────────────────────────────────────────────────────────────────

      - name: Debug — confirm secrets reach the runner
        run: |
          echo "TEST_PRO_EMAIL set: ${{ secrets.TEST_PRO_EMAIL != '' }}"
          echo "TEST_FREE_EMAIL set: ${{ secrets.TEST_FREE_EMAIL != '' }}"
          echo "VERCEL_PREVIEW_URL set: ${{ secrets.VERCEL_PREVIEW_URL != '' }}"

      - name: Run Playwright UX suites (guest + free + pro)
        run: npx playwright test --reporter=json > playwright-report.json || true
        env:
          BASE_URL: ${{ secrets.VERCEL_PREVIEW_URL }}
          TEST_FREE_EMAIL: ${{ secrets.TEST_FREE_EMAIL }}
          TEST_FREE_PASSWORD: ${{ secrets.TEST_FREE_PASSWORD }}
          TEST_PRO_EMAIL: ${{ secrets.TEST_PRO_EMAIL }}
          TEST_PRO_PASSWORD: ${{ secrets.TEST_PRO_PASSWORD }}

      - name: Check auth files created
        run: ls -la .auth/ || echo "No .auth directory"

      - name: Collect git context
        run: |
          git log --oneline -20 > git-log.txt
          git diff HEAD~5..HEAD --stat > git-diff.txt

      - name: Run UX Agent (Gemini analysis with tier-attributed evidence)
        run: node .github/scripts/ux-agent.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Check results and update streak
        id: streak
        run: |
          FAILED=$(node -e "
            const fs = require('fs');
            try {
              const r = JSON.parse(fs.readFileSync('playwright-report.json'));
              console.log(r.stats?.unexpected > 0 ? 'fail' : 'pass');
            } catch { console.log('fail'); }
          ")
          echo "Playwright result: $FAILED"
          OUTPUT=$(node .github/scripts/update-streak.js $FAILED)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "TRIGGER_AUDIT"; then
            echo "trigger_audit=true" >> $GITHUB_OUTPUT
          else
            echo "trigger_audit=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit UX Agent report and streak
        continue-on-error: true
        run: |
          git config user.name "ux-agent"
          git config user.email "ux-agent@exploreeire.ie"
          git add AGENT_REPORTS/ BRAIN/
          git commit -m "[ux-agent] findings $(date +%Y-%m-%d-%H%M)" || echo "Nothing to commit"
          git push origin main || echo "Push failed — will retry on next run"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-audit:
    needs: ux-agent
    if: needs.ux-agent.outputs.trigger_audit == 'true'
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/ux-audit.yml
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
